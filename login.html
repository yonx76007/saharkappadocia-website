<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — SaharCappadocia</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── Login-specific extras ── */
    .login-page { min-height: 100vh; }

    /* Balloon float animation on scene */
    .b1 { animation: floatB 8s ease-in-out infinite; transform-origin: center bottom; }
    .b2 { animation: floatB 11s ease-in-out 1.5s infinite; transform-origin: center bottom; }
    .b3 { animation: floatB 9s ease-in-out 0.8s infinite; transform-origin: center bottom; }
    .b4 { animation: floatB 12s ease-in-out 2.5s infinite; transform-origin: center bottom; }
    @keyframes floatB {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-14px); }
    }

    /* Stars twinkle */
    .star { animation: tw var(--d,3s) ease-in-out infinite; }
    @keyframes tw { 0%,100% { opacity: var(--o, 0.8); } 50% { opacity: 0.1; } }

    /* Sun pulse */
    #lsun { animation: sunRise 6s ease-out forwards; }
    @keyframes sunRise { from { r: 50; opacity: 0.5; } to { r: 65; opacity: 1; } }

    /* Form entrance */
    .login-box > * {
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.7s var(--ease, cubic-bezier(0.16,1,0.3,1)) both;
    }
    .login-box > *:nth-child(1) { animation-delay: 0.05s; }
    .login-box > *:nth-child(2) { animation-delay: 0.12s; }
    .login-box > *:nth-child(3) { animation-delay: 0.2s; }
    .login-box > *:nth-child(4) { animation-delay: 0.28s; }
    .login-box > *:nth-child(5) { animation-delay: 0.36s; }
    .login-box > *:nth-child(6) { animation-delay: 0.44s; }
    .login-box > *:nth-child(7) { animation-delay: 0.52s; }
    .login-box > *:nth-child(8) { animation-delay: 0.6s; }
    .login-box > *:nth-child(9) { animation-delay: 0.68s; }
    @keyframes fadeUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: none; } }

    /* Spinner inside button */
    .btn-spinner {
      display: none;
      width: 14px; height: 14px;
      border: 2px solid rgba(6,4,5,0.3);
      border-top-color: var(--bg);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .btn-login.loading .btn-spinner { display: block; }
    .btn-login.loading .btn-text   { opacity: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="login-page">

  <!-- ══ LEFT — Cappadocia Scene ══ -->
  <div class="login-scene">
    <div class="login-scene-bg">
      <svg viewBox="0 0 760 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lsky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#050318"/>
            <stop offset="22%"  stop-color="#180B38"/>
            <stop offset="40%"  stop-color="#6C2C62"/>
            <stop offset="58%"  stop-color="#C85A38"/>
            <stop offset="75%"  stop-color="#F0A040"/>
            <stop offset="90%"  stop-color="#FDCF78"/>
            <stop offset="100%" stop-color="#FEF0C0"/>
          </linearGradient>
          <linearGradient id="lrock" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stop-color="#3A1808"/>
            <stop offset="45%"  stop-color="#7A4020"/>
            <stop offset="100%" stop-color="#2A1005"/>
          </linearGradient>
          <linearGradient id="lfg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#1E0E04"/>
            <stop offset="100%" stop-color="#060302"/>
          </linearGradient>
          <radialGradient id="lsunGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#FFFDE0"/>
            <stop offset="30%"  stop-color="#FFD870"/>
            <stop offset="65%"  stop-color="rgba(255,160,60,0.4)"/>
            <stop offset="100%" stop-color="transparent"/>
          </radialGradient>
          <radialGradient id="lwinGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#FFD860" stop-opacity="0.9"/>
            <stop offset="50%"  stop-color="#FFB030" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="transparent"/>
          </radialGradient>
        </defs>

        <!-- Sky -->
        <rect width="760" height="900" fill="url(#lsky)"/>

        <!-- Stars -->
        <circle class="star" style="--d:3.2s;--o:0.85" cx="60"  cy="60"  r="1.5" fill="white"/>
        <circle class="star" style="--d:4.1s;--o:0.6"  cx="130" cy="35"  r="1"   fill="white"/>
        <circle class="star" style="--d:2.8s;--o:0.9"  cx="220" cy="55"  r="1.5" fill="white"/>
        <circle class="star" style="--d:5.2s;--o:0.55" cx="310" cy="28"  r="1"   fill="white"/>
        <circle class="star" style="--d:3.7s;--o:0.8"  cx="420" cy="48"  r="2"   fill="white"/>
        <circle class="star" style="--d:4.5s;--o:0.65" cx="510" cy="22"  r="1"   fill="white"/>
        <circle class="star" style="--d:2.4s;--o:0.75" cx="620" cy="50"  r="1.5" fill="white"/>
        <circle class="star" style="--d:6s;--o:0.5"    cx="700" cy="30"  r="1"   fill="white"/>
        <circle class="star" style="--d:3.5s;--o:0.7"  cx="740" cy="75"  r="1.5" fill="white"/>
        <circle class="star" style="--d:4.8s;--o:0.4"  cx="30"  cy="110" r="1"   fill="white"/>
        <circle class="star" style="--d:3.1s;--o:0.8"  cx="170" cy="90"  r="1"   fill="white"/>
        <circle class="star" style="--d:5s;--o:0.6"    cx="480" cy="80"  r="1"   fill="white"/>

        <!-- Sun halo layers -->
        <circle cx="380" cy="520" r="110" fill="rgba(255,200,80,0.08)"/>
        <circle cx="380" cy="520" r="85"  fill="rgba(255,200,80,0.14)"/>

        <!-- Sun core -->
        <circle id="lsun" cx="380" cy="520" r="58" fill="url(#lsunGrad)"/>
        <circle cx="380" cy="520" r="40" fill="#FFEEAA" opacity="0.95"/>

        <!-- HOT AIR BALLOONS -->
        <!-- Balloon 1 (red-orange, large, left-center) -->
        <g class="b1" transform="translate(120,180)">
          <ellipse cx="0" cy="0" rx="34" ry="44" fill="#D42830"/>
          <path d="M-34 0 Q0 -36 34 0" fill="rgba(255,220,60,0.55)"/>
          <path d="M-34 0 Q0 36 34 0 Q0 22 -34 0Z" fill="rgba(200,40,10,0.35)"/>
          <line x1="-22" y1="42" x2="-24" y2="55" stroke="#7A4E10" stroke-width="1.3"/>
          <line x1="22"  y1="42" x2="24"  y2="55" stroke="#7A4E10" stroke-width="1.3"/>
          <rect x="-26" y="55" width="52" height="14" rx="3" fill="#5A3A10"/>
        </g>

        <!-- Balloon 2 (indigo, mid-left) -->
        <g class="b2" transform="translate(240,120)">
          <ellipse cx="0" cy="0" rx="26" ry="34" fill="#3A2FA0"/>
          <path d="M-26 0 Q0 -28 26 0" fill="rgba(255,200,60,0.5)"/>
          <path d="M-26 0 Q0 26 26 0 Q0 16 -26 0Z" fill="rgba(100,180,255,0.35)"/>
          <line x1="-17" y1="32" x2="-18" y2="43" stroke="#5A3E10" stroke-width="1"/>
          <line x1="17"  y1="32" x2="18"  y2="43" stroke="#5A3E10" stroke-width="1"/>
          <rect x="-19" y="43" width="38" height="11" rx="2.5" fill="#42280A"/>
        </g>

        <!-- Balloon 3 (gold-amber, center, large) -->
        <g class="b3" transform="translate(395,90)">
          <ellipse cx="0" cy="0" rx="40" ry="52" fill="#C88018"/>
          <path d="M-40 0 Q0 -44 40 0" fill="rgba(255,240,100,0.6)"/>
          <path d="M-40 0 Q0 44 40 0 Q0 28 -40 0Z" fill="rgba(180,60,10,0.3)"/>
          <line x1="-26" y1="50" x2="-28" y2="65" stroke="#7A5012" stroke-width="1.4"/>
          <line x1="26"  y1="50" x2="28"  y2="65" stroke="#7A5012" stroke-width="1.4"/>
          <rect x="-30" y="65" width="60" height="16" rx="3" fill="#5C3A10"/>
        </g>

        <!-- Balloon 4 (emerald, right) -->
        <g class="b4" transform="translate(580,150)">
          <ellipse cx="0" cy="0" rx="29" ry="38" fill="#2A7848"/>
          <path d="M-29 0 Q0 -32 29 0" fill="rgba(255,220,80,0.5)"/>
          <path d="M-29 0 Q0 32 29 0 Q0 20 -29 0Z" fill="rgba(60,200,120,0.3)"/>
          <line x1="-19" y1="36" x2="-20" y2="48" stroke="#5A3E10" stroke-width="1.2"/>
          <line x1="19"  y1="36" x2="20"  y2="48" stroke="#5A3E10" stroke-width="1.2"/>
          <rect x="-22" y="48" width="44" height="13" rx="2.5" fill="#40280A"/>
        </g>

        <!-- Tiny far balloon -->
        <g transform="translate(490,60)" opacity="0.45">
          <ellipse cx="0" cy="0" rx="16" ry="21" fill="#A02828"/>
          <rect x="-10" y="20" width="20" height="7" rx="1.5" fill="#402010"/>
        </g>

        <!-- Landscape / valley -->
        <path d="M0 640 Q95 580 190 605 Q290 560 390 580 Q490 548 590 570 Q680 545 760 560 L760 900 L0 900Z" fill="#3A1808" opacity="0.75"/>

        <!-- Cliff with cave hotel windows -->
        <path d="M160 900 L160 500 Q220 460 280 450 Q340 440 400 448 Q460 442 520 455 Q580 465 600 900Z" fill="url(#lrock)" opacity="0.92"/>

        <!-- Cave windows -->
        <circle cx="210" cy="570" r="24" fill="url(#lwinGrad)" opacity="0.8"/>
        <ellipse cx="210" cy="568" rx="12" ry="15" fill="#FFDC70" opacity="0.9"/>
        <circle cx="270" cy="545" r="26" fill="url(#lwinGrad)" opacity="0.85"/>
        <ellipse cx="270" cy="543" rx="13" ry="16" fill="#FFEF80" opacity="0.9"/>
        <circle cx="340" cy="530" r="28" fill="url(#lwinGrad)" opacity="0.9"/>
        <ellipse cx="340" cy="528" rx="15" ry="18" fill="#FFDC60" opacity="0.95"/>
        <circle cx="415" cy="535" r="24" fill="url(#lwinGrad)" opacity="0.8"/>
        <ellipse cx="415" cy="533" rx="12" ry="15" fill="#FFD050" opacity="0.85"/>
        <circle cx="480" cy="548" r="22" fill="url(#lwinGrad)" opacity="0.75"/>
        <ellipse cx="480" cy="546" rx="11" ry="14" fill="#F0C040" opacity="0.8"/>
        <circle cx="540" cy="568" r="20" fill="url(#lwinGrad)" opacity="0.7"/>
        <ellipse cx="540" cy="566" rx="10" ry="13" fill="#E8B830" opacity="0.75"/>

        <!-- Row 2 windows -->
        <circle cx="225" cy="640" r="20" fill="url(#lwinGrad)" opacity="0.65"/>
        <ellipse cx="225" cy="638" rx="10" ry="13" fill="#E8B830" opacity="0.75"/>
        <circle cx="295" cy="618" r="22" fill="url(#lwinGrad)" opacity="0.7"/>
        <ellipse cx="295" cy="616" rx="11" ry="14" fill="#F0C040" opacity="0.8"/>
        <circle cx="370" cy="608" r="24" fill="url(#lwinGrad)" opacity="0.75"/>
        <ellipse cx="370" cy="606" rx="12" ry="15" fill="#FFDC60" opacity="0.85"/>
        <circle cx="448" cy="618" r="20" fill="url(#lwinGrad)" opacity="0.68"/>
        <ellipse cx="448" cy="616" rx="10" ry="13" fill="#F0C040" opacity="0.75"/>
        <circle cx="516" cy="636" r="18" fill="url(#lwinGrad)" opacity="0.6"/>
        <ellipse cx="516" cy="634" rx="9" ry="11" fill="#E8B030" opacity="0.7"/>

        <!-- Fairy chimneys (far) -->
        <path d="M60 640 Q58 605 68 590 Q73 577 79 590 Q85 605 83 640Z" fill="#8A5530" opacity="0.6"/>
        <ellipse cx="72" cy="577" rx="11" ry="15" fill="#A06840" opacity="0.6"/>
        <path d="M660 620 Q658 584 668 568 Q673 554 680 568 Q687 584 685 620Z" fill="#8A5530" opacity="0.55"/>
        <ellipse cx="673" cy="554" rx="12" ry="16" fill="#A06840" opacity="0.55"/>
        <path d="M710 630 Q708 598 717 585 Q721 574 727 585 Q733 598 731 630Z" fill="#7A4C28" opacity="0.5"/>
        <ellipse cx="720" cy="574" rx="10" ry="13" fill="#9A6038" opacity="0.5"/>

        <!-- Foreground dark -->
        <path d="M0 800 Q190 765 380 778 Q570 762 760 772 L760 900 L0 900Z" fill="url(#lfg)"/>

        <!-- Ground mist -->
        <path d="M0 790 Q380 760 760 778 L760 820 Q380 808 0 820Z" fill="rgba(255,170,60,0.06)"/>
      </svg>
    </div>
    <div class="login-scene-overlay"></div>
    <div class="login-brand">
      <a href="sahar-cappadocia.html" class="login-brand-logo" style="text-decoration:none;transition:opacity 0.3s" onmouseover="this.style.opacity='0.75'" onmouseout="this.style.opacity='1'">Sahar<span>Cappadocia</span></a>
      <div class="login-brand-line"></div>
      <div class="login-brand-tagline">Admin &amp; Operations Portal</div>
    </div>
  </div>

  <!-- ══ RIGHT — Login Form ══ -->
  <div class="login-form-panel">
    <div class="login-box">

      <a href="sahar-cappadocia.html" style="display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;letter-spacing:0.08em;color:rgba(239,231,214,0.45);text-decoration:none;margin-bottom:32px;transition:color 0.2s;text-transform:uppercase" onmouseover="this.style.color='#C9A84C'" onmouseout="this.style.color='rgba(239,231,214,0.45)'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Website
      </a>

      <h1 class="login-heading">Welcome<br><em>back.</em></h1>
      <p class="login-sub">Sign in to manage bookings, guests, and experiences.</p>

      <div class="login-error" id="login-error">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="error-text">Invalid credentials. Please try again.</span>
      </div>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="email">Email Address</label>
          <div class="field-wrap">
            <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input type="email" id="email" name="email" placeholder="admin@saharcappadocia.com" autocomplete="email" required>
          </div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="field-wrap">
            <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
            <button type="button" class="eye-toggle" id="eye-toggle" aria-label="Toggle password">
              <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="login-meta">
          <label class="checkbox-wrap">
            <input type="checkbox" id="remember" name="remember">
            <span class="checkbox-box"></span>
            <span class="checkbox-label">Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login" id="login-btn">
          <span class="btn-text">Sign In to Dashboard</span>
          <div class="btn-spinner"></div>
        </button>
      </form>

      <div class="login-hint">
        <strong>Demo Access</strong><br>
        Use any email &amp; password combination to enter.<br>
        e.g. <strong>admin@sahar.com</strong> / <strong>admin123</strong>
      </div>

    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
